<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INEM Centro — Tempos de Resposta de Emergência</title>

  <!-- Fonts: JetBrains Mono for data; body uses system sans-serif -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar" class="sidebar">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">INEM Centro</span>
        <span class="brand-sub">Tempos de Resposta</span>
      </div>
      <button id="hamburger-close" class="hamburger-close" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="Rua, localidade, código postal..." autocomplete="off" />
        <button id="search-clear" class="search-clear" title="Limpar">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Filters -->
    <div class="filter-section">
      <!-- Time filter (radio) -->
      <div class="filter-row">
        <span class="filter-label">
          <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          ETA máx.
        </span>
        <div class="filter-btns">
          <button class="filter-time" data-time="30">≤30'</button>
          <button class="filter-time active" data-time="60">≤60'</button>
          <button class="filter-time" data-time="90">≤90'</button>
        </div>
      </div>
      <!-- Unit type filters (toggle) -->
      <div class="filter-row">
        <span class="filter-label">
          <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Meios
        </span>
        <div class="filter-btns">
          <button class="filter-type active" data-type="vmer" style="--type-color:#f59e0b">VMER</button>
          <button class="filter-type active" data-type="siv"  style="--type-color:#10b981">SIV</button>
          <button class="filter-type"        data-type="aem"  style="--type-color:#3b82f6">AEM</button>
        </div>
      </div>
    </div>

    <!-- Time-of-day slider (demo mode) -->
    <div class="tod-bar" id="tod-bar">
      <span class="tod-label">Hora</span>
      <input type="range" id="tod-slider" min="0" max="23" step="1" value="12" class="tod-slider" />
      <span class="tod-value" id="tod-value">12:00</span>
      <span class="tod-congestion" id="tod-congestion"></span>
    </div>

    <!-- Results panel -->
    <div id="results-panel" class="results-panel"></div>

    <!-- Footer -->
    <div class="sidebar-footer">
      ETAs via OpenRouteService/OSM · Fator 1.3× (condução de emergência)
    </div>
  </aside>

  <!-- ===== MAP ===== -->
  <main id="map-wrap" class="map-wrap">

    <button id="hamburger" class="hamburger" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Mini status chip (top-right) -->
    <div id="status-chip" class="status-chip hidden">
      <span id="status-text"></span>
    </div>

    <div id="map"></div>
  </main>

  <script src="data.js"></script>
  <script src="postal_cp4.js"></script>
  <script src="postal.js"></script>
  <script src="grid_etas.js"></script>
  <script src="app.js"></script>
</body>
</html>
