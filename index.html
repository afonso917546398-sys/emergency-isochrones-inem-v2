<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INEM Centro — Isócronas de Emergência</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== MOBILE OVERLAY ===== -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar" class="sidebar">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-title">INEM Centro</span>
        <span class="brand-sub">Isócronas de Emergência</span>
      </div>
      <button id="hamburger-close" class="hamburger-close" aria-label="Fechar sidebar">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="text" placeholder="Rua, localidade, código postal..." autocomplete="off" />
        <button id="search-clear" class="search-clear" title="Limpar">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Isochrone buttons -->
    <div class="iso-controls">
      <span class="iso-label">Isócronas:</span>
      <div class="iso-buttons">
        <button id="btn-iso-30" class="iso-btn iso-btn--30 active" data-band="30">
          <span class="iso-dot" style="background:#22c55e"></span>
          Até 30'
        </button>
        <button id="btn-iso-60" class="iso-btn iso-btn--60" data-band="60">
          <span class="iso-dot" style="background:#ef4444"></span>
          Mais de 30'
        </button>
      </div>
    </div>

    <!-- Units list -->
    <div id="units-list" class="units-list">
      <!-- Groups injected by app.js -->
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      Isócronas via OpenRouteService/OSM · Fator 1.3× velocidade (condução de emergência)
    </div>
  </aside>

  <!-- ===== MAP ===== -->
  <main id="map-wrap" class="map-wrap">
    <!-- Hamburger button (mobile) -->
    <button id="hamburger" class="hamburger" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Stats bar -->
    <div id="stats-bar" class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">Ativos</span>
        <span id="stat-total" class="stat-value">—</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-dot" style="background:#3b82f6"></span>
        <span class="stat-label">AEM</span>
        <span id="stat-aem" class="stat-value">—</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-dot" style="background:#10b981"></span>
        <span class="stat-label">SIV</span>
        <span id="stat-siv" class="stat-value">—</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-dot" style="background:#f59e0b"></span>
        <span class="stat-label">VMER</span>
        <span id="stat-vmer" class="stat-value">—</span>
      </div>
    </div>

    <!-- Leaflet map -->
    <div id="map"></div>
  </main>

  <!-- Data files -->
  <script src="data.js"></script>
  <script src="postal_cp4.js"></script>
  <script src="postal.js"></script>
  <script src="grid_etas.js"></script>
  <!-- Main app -->
  <script src="app.js"></script>
</body>
</html>
